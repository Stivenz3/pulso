name: Notify Cron

on:
  schedule:
    # Cada 15 minutos (UTC)
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger notify endpoint (with retries)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -eo pipefail

          # Normalizar secrets (quitar CR/LF y espacios al inicio/fin)
          APP_URL_CLEAN="$(printf '%s' "${APP_URL:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CRON_SECRET_CLEAN="$(printf '%s' "${CRON_SECRET:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$APP_URL_CLEAN" ]; then
            echo "Missing APP_URL secret"
            exit 1
          fi
          if [ -z "$CRON_SECRET_CLEAN" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi

          # Validar formato de URL
          case "$APP_URL_CLEAN" in
            http://*|https://*) ;;
            *)
              echo "APP_URL inválida. Debe iniciar con http:// o https://"
              echo "Valor recibido (oculto parcialmente): ${APP_URL_CLEAN:0:12}..."
              exit 1
              ;;
          esac

          URL="${APP_URL_CLEAN%/}/api/notify"
          echo "Calling $URL"

          # Hasta 3 intentos con backoff
          for i in 1 2 3; do
            HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
              -H "Authorization: Bearer ${CRON_SECRET_CLEAN}" \
              -H "Accept: application/json" \
              "$URL" || true)

            echo "Attempt $i HTTP $HTTP_CODE"
            if [ -f response.json ]; then
              cat response.json
            else
              echo "No response body file"
            fi

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Notify call succeeded"
              exit 0
            fi

            sleep $((i * 5))
          done

          echo "Notify call failed after retries"
          exit 1
