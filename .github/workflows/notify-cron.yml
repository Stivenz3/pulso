name: Notify Cron

on:
  schedule:
    # Cada 15 minutos (UTC)
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger notify endpoint (with retries)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${APP_URL:-}" ]; then
            echo "Missing APP_URL secret"
            exit 1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi

          URL="${APP_URL_CLEAN%/}/api/notify?forceNow=1"
          echo "Calling $URL"

          # Hasta 3 intentos con backoff
          for i in 1 2 3; do
            HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Accept: application/json" \
              "$URL" || true)

            echo "Attempt $i HTTP $HTTP_CODE"
            cat response.json || true

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Notify call succeeded"
              exit 0
            fi

            sleep $((i * 5))
          done

          echo "Notify call failed after retries"
          exit 1
